name: 01 - Create Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  TF_VERSION: "1.7.5"
  TF_STATE_BUCKET: s3-hwc-aws-tfstate-039612850740
  TF_STATE_TABLE: ddb-hwc-aws-tfstate-lock
  TF_STATE_KEY: hwc-aws.terraform.tfstate
  ECR_REPO_NAME: hello-world-aws
  FUNC_ECR_REPO_NAME: hello-world-aws-func

jobs:
  bootstrap:
    name: Bootstrap TF State Backend
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 state bucket
        run: |
          aws s3api create-bucket \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }} \
            2>&1 | grep -v "BucketAlreadyOwnedByYou" || true

          aws s3api put-bucket-versioning \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Create DynamoDB lock table
        run: |
          aws dynamodb create-table \
            --table-name ${{ env.TF_STATE_TABLE }} \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${{ env.AWS_REGION }} \
            2>/dev/null || echo "Table already exists"

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: bootstrap
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_TABLE }}"

      - name: Terraform Apply ECR and IAM (targeted)
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.main \
            -target=aws_ecr_lifecycle_policy.main \
            -target=aws_iam_role.apprunner_ecr_access \
            -target=aws_iam_role_policy_attachment.apprunner_ecr_access \
            -target=aws_ecr_repository.func \
            -target=aws_ecr_lifecycle_policy.func \
            -target=aws_iam_role.lambda_exec \
            -target=aws_iam_role_policy_attachment.lambda_basic

      - name: Push seed image to ECR
        run: |
          ECR_URL=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPO_NAME }} \
            --query 'repositories[0].repositoryUri' \
            --output text)

          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin $ECR_URL

          # Build a minimal seed image that serves HTTP on port 8000 so
          # App Runner can start the container and pass its health check.
          # Workflow 02 will replace this with the real application image.
          printf 'FROM python:3.11-slim\nCMD ["python", "-m", "http.server", "8000"]\n' > /tmp/Dockerfile.seed
          docker build -t seed-image -f /tmp/Dockerfile.seed /tmp
          docker tag seed-image $ECR_URL:latest
          docker push $ECR_URL:latest

      - name: Push seed image to Lambda ECR
        run: |
          FUNC_ECR_URL=$(aws ecr describe-repositories \
            --repository-names ${{ env.FUNC_ECR_REPO_NAME }} \
            --query 'repositories[0].repositoryUri' \
            --output text)

          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin $FUNC_ECR_URL

          # Build a minimal seed Lambda image so the functions can be created
          # by Terraform. Workflow 02 will replace this with the real handler image.
          cat > /tmp/seed_handler.py << 'EOF'
def handler(event, context):
    return {"statusCode": 200, "body": "seed"}
EOF
          cat > /tmp/Dockerfile.func.seed << 'EOF'
FROM public.ecr.aws/lambda/python:3.11
COPY seed_handler.py /var/task/handler.py
CMD ["handler.handler"]
EOF
          docker build -t seed-func -f /tmp/Dockerfile.func.seed /tmp
          docker tag seed-func $FUNC_ECR_URL:latest
          docker push $FUNC_ECR_URL:latest

      - name: Terraform Apply (full)
        working-directory: infra
        run: terraform apply -auto-approve
